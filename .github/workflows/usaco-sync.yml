name: USACO Sync diario

on:
  schedule:
    # Todos los días a las 9:00 AM hora Colombia (UTC-5 = 14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar endpoint USACO sync
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/cron/usaco-sync")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: El endpoint retornó $STATUS"
            exit 1
          fi

      - name: Resultado
        run: echo "Sync USACO completado exitosamente"
